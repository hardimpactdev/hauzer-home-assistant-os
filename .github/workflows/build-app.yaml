name: Build app

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      publish:
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    if: github.repository == 'hardimpactdev/hauzer-home-assistant-os'
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      description: ${{ steps.normalize.outputs.description }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      name: ${{ steps.normalize.outputs.name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      url: ${{ steps.normalize.outputs.url }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
      # Pinned to the reviewed Home Assistant actions revision from 2026-07-15.
      - name: Read app information
        id: info
        uses: home-assistant/actions/helpers/info@f4ca6f671bd429efb108c0f2fa0ae8af0215986c
        with:
          path: ./${{ inputs.app }}
      - name: Normalize app information
        id: normalize
        env:
          DESCRIPTION: ${{ steps.info.outputs.description }}
          IMAGE: ${{ steps.info.outputs.image }}
          NAME: ${{ steps.info.outputs.name }}
          URL: ${{ steps.info.outputs.url }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          {
            echo "image_name=${IMAGE##*/}"
            echo "registry_prefix=${IMAGE%/*}"
            echo "version=$VERSION"
            echo "name=$NAME"
            echo "description=$DESCRIPTION"
            if [[ -n "$URL" && "$URL" != "null" ]]; then
              echo "url=$URL"
            fi
          } >> "$GITHUB_OUTPUT"
      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./${{ inputs.app }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}
          push: ${{ inputs.publish }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs:
      - prepare
      - build
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}
